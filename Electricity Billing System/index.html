<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Bill Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:25px;
    width:350px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#16a34a;
}

input,select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#16a34a;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#15803d;
}

#result{
    margin-top:15px;
    padding:10px;
    background:#f3f4f6;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
    <h2>⚡ Electricity Bill Calculator</h2>

    <input type="text" id="name" placeholder="Consumer Name">

    <select id="state">
        <option>Chhattisgarh</option>
        <option>Madhya Pradesh</option>
        <option>Maharashtra</option>
        <option>Delhi</option>
        <option>Karnataka</option>
    </select>

    <input type="number" id="units" placeholder="Units Consumed">

    <button onclick="generateBill()">Generate Bill</button>

    <div id="result"></div>
</div>

<script>

const tariffs = {
    "Chhattisgarh":[1.5,2.5,4,6,125],
    "Madhya Pradesh":[2,3,5,7,150],
    "Maharashtra":[3,5,7,9,175],
    "Delhi":[2.5,4,6,8,100],
    "Karnataka":[2.2,3.8,5.5,7.5,140]
};

function generateBill(){

    let name = document.getElementById("name").value;
    let state = document.getElementById("state").value;
    let units = parseInt(document.getElementById("units").value);

    if(!name || isNaN(units)){
        alert("Please fill all fields");
        return;
    }

    let t = tariffs[state];
    let bill = 0;

    if(units <= 100)
        bill = units * t[0];
    else if(units <= 200)
        bill = (100*t[0]) + ((units-100)*t[1]);
    else if(units <= 300)
        bill = (100*t[0]) + (100*t[1]) + ((units-200)*t[2]);
    else
        bill = (100*t[0]) + (100*t[1]) + (100*t[2]) + ((units-300)*t[3]);

    bill += t[4];

    document.getElementById("result").innerHTML = `
        <b>Name:</b> ${name}<br>
        <b>State:</b> ${state}<br>
        <b>Units:</b> ${units}<br>
        <b>Total Bill:</b> ₹${bill.toFixed(2)}
    `;
}

</script>

</body>
</html>
